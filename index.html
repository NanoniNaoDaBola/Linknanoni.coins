<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanonicoins Hub</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family: Inter, sans-serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(57,211,83,.08), transparent 30%),
    radial-gradient(circle at 80% 10%, rgba(255,48,69,.08), transparent 30%),
    #0b0b0b;
  color:#fff;
}

.container{
  max-width:520px;
  margin:auto;
  padding:20px 14px 40px;
}

.header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:16px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.08);
}

.logo img{
  width:38px;
}

.title{
  font-size:22px;
  font-weight:900;
  letter-spacing:-0.03em;
}

.subtitle{
  font-size:12px;
  color:rgba(255,255,255,.5);
}

/* CARD */

.card{
  position:relative;
  height:140px;
  border-radius:26px;
  overflow:hidden;
  margin-bottom:14px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.08);
}

.card img,
.card video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay dark */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right, rgba(0,0,0,.65), rgba(0,0,0,.15));
}

/* glow */
.card.free::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 20% 50%, rgba(57,211,83,.25), transparent 60%);
}

.card.vip::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 20% 50%, rgba(255,48,69,.25), transparent 60%);
}

.content{
  position:absolute;
  z-index:2;
  left:18px;
  bottom:18px;
}

.label{
  font-size:10px;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:rgba(255,255,255,.6);
  margin-bottom:6px;
}

.name{
  font-size:22px;
  font-weight:900;
}

.arrow{
  position:absolute;
  right:16px;
  bottom:16px;
  width:38px;
  height:38px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* SOCIAL */

.social{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:10px;
}

.social .card{
  height:100px;
}

.small{
  font-size:16px;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">
      <img src="assets/logo-main.png">
    </div>
    <div>
      <div class="title">Nanonicoins</div>
      <div class="subtitle">Hub Oficial</div>
    </div>
  </div>

  <!-- FREE -->
  <a href="https://t.me/+pR5RzyPgUKY2NDZh">
    <div class="card free">
      <video autoplay muted loop playsinline>
        <source src="assets/free-video.mp4">
      </video>

      <div class="content">
        <div class="label">Nanonicoins Radar</div>
        <div class="name">FREE</div>
      </div>

      <div class="arrow">→</div>
    </div>
  </a>

  <!-- VIP -->
  <a href="https://payment.ticto.app/O64599EB6">
    <div class="card vip">
      <video autoplay muted loop playsinline>
        <source src="assets/vip-video.mp4">
      </video>

      <div class="content">
        <div class="label">Nanonicoins VIP</div>
        <div class="name">Founder Access</div>
      </div>

      <div class="arrow">→</div>
    </div>
  </a>

  <!-- LANDINGS -->
  <a href="https://lading-free.vercel.app/">
    <div class="card">
      <img src="assets/free-cover.jpg">

      <div class="content">
        <div class="label">Página</div>
        <div class="name small">Landing FREE</div>
      </div>

      <div class="arrow">→</div>
    </div>
  </a>

  <a href="https://nanonicoins-vip.vercel.app/">
    <div class="card">
      <img src="assets/vip-cover.jpg">

      <div class="content">
        <div class="label">Página</div>
        <div class="name small">Landing VIP</div>
      </div>

      <div class="arrow">→</div>
    </div>
  </a>

  <!-- SOCIAL -->
  <div class="social">

    <a href="https://www.instagram.com/nanoni.corp">
      <div class="card">
        <img src="assets/insta.jpg">
        <div class="content">
          <div class="name small">Instagram</div>
        </div>
      </div>
    </a>

    <a href="https://www.tiktok.com/@nanonicorp">
      <div class="card">
        <img src="assets/tiktok.jpg">
        <div class="content">
          <div class="name small">TikTok</div>
        </div>
      </div>
    </a>

  </div>

</div>

</body>
</html>
