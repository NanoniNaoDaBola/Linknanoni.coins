<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NanoniCoins Hub</title>

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root{
      --bg-0:#040404;
      --bg-1:#080808;
      --bg-2:#0d0d0d;
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,255,255,.14);
      --text-soft:rgba(255,255,255,.58);
      --green:#43ff86;
      --green-soft:rgba(67,255,134,.22);
      --red:#ff5a5a;
      --red-soft:rgba(255,90,90,.22);
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family: Inter, sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 50% -12%, rgba(255,255,255,.06), transparent 26%),
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.025), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(255,255,255,.025), transparent 20%),
        linear-gradient(180deg, #030303 0%, #070707 48%, #030303 100%);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,.025), transparent 22%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.02), transparent 34%);
      mix-blend-mode:screen;
    }

    .rain{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:.15;
      background-image:
        linear-gradient(to bottom, rgba(255,40,40,0), rgba(255,40,40,.16), rgba(255,40,40,0)),
        linear-gradient(to bottom, rgba(255,60,60,0), rgba(255,60,60,.10), rgba(255,60,60,0)),
        linear-gradient(to bottom, rgba(255,30,30,0), rgba(255,30,30,.13), rgba(255,30,30,0)),
        linear-gradient(to bottom, rgba(255,90,90,0), rgba(255,90,90,.07), rgba(255,90,90,0));
      background-size:
        2px 180px,
        2px 220px,
        2px 240px,
        2px 280px;
      background-position:
        8% -240px,
        31% -320px,
        57% -260px,
        83% -340px;
      background-repeat: repeat-y;
      animation: rainMove 5.2s linear infinite;
    }

    @keyframes rainMove{
      0%{
        background-position: 8% -240px, 31% -320px, 57% -260px, 83% -340px;
      }
      100%{
        background-position: 8% 940px, 31% 1000px, 57% 960px, 83% 1040px;
      }
    }

    .wrap{
      width:min(900px, calc(100% - 28px));
      margin:0 auto;
      padding:34px 0 46px;
      position:relative;
      z-index:2;
    }

    .top{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:20px;
      position:relative;
    }

    .top::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-12px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      opacity:.7;
    }

    .top-logo{
      width:66px;
      height:66px;
      border-radius:21px;
      border:1px solid rgba(255,255,255,.09);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      display:grid;
      place-items:center;
      flex-shrink:0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 12px 34px rgba(0,0,0,.26);
      backdrop-filter: blur(10px);
    }

    .top-logo img{
      width:44px;
      display:block;
      filter: drop-shadow(0 0 10px rgba(255,0,0,.08));
    }

    .eyebrow{
      font-size:11px;
      letter-spacing:.36em;
      text-transform:uppercase;
      color:rgba(255,255,255,.34);
      font-weight:800;
      margin-bottom:2px;
    }

    .title{
      font-size:34px;
      font-weight:900;
      line-height:1.02;
      letter-spacing:-.03em;
    }

    .subtitle{
      color:rgba(255,255,255,.58);
      font-size:14px;
      margin-top:5px;
      letter-spacing:.01em;
    }

    .hero-shell{
      position:relative;
      padding:18px;
      border-radius:36px;
      border:1px solid rgba(255,255,255,.09);
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.025));
      box-shadow:
        0 18px 60px rgba(0,0,0,.32),
        inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(12px);
      overflow:hidden;
    }

    .hero-shell::before{
      content:"";
      position:absolute;
      inset:-20% -10%;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.035), transparent 24%),
        radial-gradient(circle at 50% 110%, rgba(255,255,255,.02), transparent 30%);
      pointer-events:none;
    }

    .stack{
      position:relative;
      display:grid;
      gap:18px;
      z-index:1;
    }

    .card{
      position:relative;
      min-height:220px;
      border-radius:32px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.07);
      background:#080808;
      display:block;
      text-decoration:none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 16px 42px rgba(0,0,0,.28);
      transition:
        transform .3s ease,
        border-color .3s ease,
        box-shadow .3s ease,
        filter .3s ease;
      animation: floatCard 6s ease-in-out infinite;
    }

    .card:nth-child(2){
      animation-delay: .6s;
    }

    @keyframes floatCard{
      0%,100%{ transform: translateY(0px); }
      50%{ transform: translateY(-3px); }
    }

    .card:hover{
      transform: translateY(-4px) scale(1.008);
      border-color: rgba(255,255,255,.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 24px 62px rgba(0,0,0,.36);
      filter:saturate(1.04);
    }

    .card img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform-origin:center;
      transition: transform .45s ease, filter .45s ease;
    }

    .free-card img{
      transform: scale(1.12);
    }

    .vip-card img{
      transform: scale(1.10);
    }

    .card:hover img{
      transform: scale(1.145);
      filter: contrast(1.03) brightness(1.02);
    }

    .card::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to top, rgba(0,0,0,.15), rgba(0,0,0,.02) 42%, rgba(0,0,0,.05)),
        linear-gradient(to right, rgba(0,0,0,.10), transparent 34%, transparent 66%, rgba(0,0,0,.10));
      pointer-events:none;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.09), transparent);
      pointer-events:none;
      z-index:2;
    }

    .free-card:hover{
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 0 0 1px rgba(67,255,134,.06),
        0 16px 42px rgba(0,0,0,.32),
        0 0 32px rgba(67,255,134,.08);
    }

    .vip-card:hover{
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 0 0 1px rgba(255,90,90,.06),
        0 16px 42px rgba(0,0,0,.32),
        0 0 34px rgba(255,90,90,.08);
    }

    .section-tag{
      position:absolute;
      top:18px;
      left:20px;
      z-index:3;
      font-size:14px;
      font-weight:900;
      letter-spacing:.34em;
      text-transform:uppercase;
      text-shadow: 0 0 10px rgba(255,255,255,.05);
      transition: transform .25s ease, opacity .25s ease;
    }

    .card:hover .section-tag{
      transform: translateY(-1px);
    }

    .section-tag.free{
      color:#7dff9d;
      text-shadow:
        0 0 14px rgba(34,197,94,.22),
        0 0 28px rgba(34,197,94,.08);
    }

    .section-tag.vip{
      color:#ff7d7d;
      text-shadow:
        0 0 14px rgba(239,68,68,.22),
        0 0 28px rgba(239,68,68,.08);
    }

    .section-tag::after{
      content:"";
      display:block;
      width:34px;
      height:2px;
      margin-top:8px;
      border-radius:999px;
      opacity:.9;
      transition: width .25s ease;
    }

    .card:hover .section-tag::after{
      width:48px;
    }

    .section-tag.free::after{
      background:linear-gradient(90deg, #22c55e, transparent);
    }

    .section-tag.vip::after{
      background:linear-gradient(90deg, #ef4444, transparent);
    }

    .social-row{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-top:2px;
    }

    .social-row a{
      width:48px;
      height:48px;
      border-radius:16px;
      background:rgba(0,0,0,.62);
      backdrop-filter: blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 12px 30px rgba(0,0,0,.22);
      transition:.24s ease;
      position:relative;
      overflow:hidden;
    }

    .social-row a::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:0;
      transition:opacity .24s ease;
      pointer-events:none;
    }

    .social-row a:hover{
      transform: translateY(-2px) scale(1.09);
      border-color: rgba(255,255,255,.18);
      background:rgba(8,8,8,.84);
    }

    .social-row a.instagram:hover{
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05),
        0 0 18px rgba(255,84,146,.18),
        0 12px 30px rgba(0,0,0,.22);
    }

    .social-row a.instagram::before{
      background: radial-gradient(circle at 50% 50%, rgba(255,84,146,.18), transparent 65%);
    }

    .social-row a.tiktok:hover{
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05),
        0 0 18px rgba(34,211,238,.18),
        0 12px 30px rgba(0,0,0,.22);
    }

    .social-row a.tiktok::before{
      background: radial-gradient(circle at 50% 50%, rgba(34,211,238,.18), transparent 65%);
    }

    .social-row a:hover::before{
      opacity:1;
    }

    .social-row img{
      width:22px;
      height:22px;
      object-fit:contain;
      display:block;
      position:relative;
      z-index:1;
    }

    @media (max-width:720px){
      .wrap{
        width:min(100%, calc(100% - 20px));
      }

      .title{
        font-size:30px;
      }

      .subtitle{
        font-size:13px;
      }

      .card{
        min-height:190px;
        border-radius:28px;
      }

      .section-tag{
        font-size:13px;
      }
    }

    @media (max-width:520px){
      .wrap{
        width:min(100%, calc(100% - 16px));
        padding-top:22px;
      }

      .top{
        gap:12px;
      }

      .top-logo{
        width:56px;
        height:56px;
        border-radius:18px;
      }

      .top-logo img{
        width:38px;
      }

      .title{
        font-size:28px;
      }

      .hero-shell{
        padding:12px;
        border-radius:28px;
      }

      .card{
        min-height:168px;
        border-radius:24px;
      }

      .section-tag{
        top:14px;
        left:16px;
        font-size:12px;
      }

      .social-row{
        gap:14px;
      }

      .social-row a{
        width:44px;
        height:44px;
        border-radius:14px;
      }

      .social-row img{
        width:20px;
        height:20px;
      }
    }
  </style>
</head>

<body>
  <div class="rain"></div>

  <main class="wrap">

    <section class="top">
      <div class="top-logo">
        <img src="assets/logo-main.png" alt="Logo NanoniCoins">
      </div>

      <div>
        <div class="eyebrow">NANONICOINS</div>
        <div class="title">Hub Oficial</div>
        <div class="subtitle">Radar Access • Free & VIP</div>
      </div>
    </section>

    <section class="hero-shell">
      <div class="stack">

        <a class="card free-card" href="https://lading-free.vercel.app/" target="_blank" rel="noopener noreferrer">
          <span class="section-tag free">FREE</span>
          <img src="assets/free-cover.jpg" alt="Free">
        </a>

        <a class="card vip-card" href="https://nanonicoins-vip.vercel.app/" target="_blank" rel="noopener noreferrer">
          <span class="section-tag vip">VIP</span>
          <img src="assets/vip-cover.jpg" alt="VIP">
        </a>

        <div class="social-row">
          <a class="instagram" href="https://www.instagram.com/nanoni.corp" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <img src="assets/instagram.png" alt="Instagram">
          </a>

          <a class="tiktok" href="https://www.tiktok.com/@nanonicorp" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
            <img src="assets/tiktok.png" alt="TikTok">
          </a>
        </div>

      </div>
    </section>

  </main>
</body>
</html>
