<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanonicoins Hub</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:#050505;
  color:#fff;
  display:flex;
  justify-content:center;
  padding:40px 20px;
}

/* CONTAINER */
.hub{
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* HEADER */
.header{
  margin-bottom:10px;
}

.header h1{
  font-size:26px;
  font-weight:600;
}

.header span{
  font-size:12px;
  opacity:.5;
}

/* CARDS */
.card{
  position:relative;
  height:210px;
  border-radius:30px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
  background:#080808;
  display:block;
  text-decoration:none;
  transition:.25s ease;
}

.card:hover{
  transform: scale(1.01);
  border-color: rgba(255,255,255,.12);
}

.card img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay leve premium */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.25), transparent);
}

/* SOCIAL ICONS */
.social-row{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-top:-5px;
}

.social-row a{
  width:42px;
  height:42px;
  border-radius:14px;
  background:rgba(0,0,0,.6);
  backdrop-filter: blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.08);
  transition:.2s;
}

.social-row a:hover{
  transform: scale(1.12);
  border-color: rgba(255,255,255,.2);
}

.social-row img{
  width:20px;
  height:20px;
}

</style>
</head>

<body>

<div class="hub">

  <!-- HEADER -->
  <div class="header">
    <span>NANONICOINS</span>
    <h1>Hub Oficial</h1>
  </div>

  <!-- FREE -->
  <a class="card" href="https://lading-free.vercel.app/">
    <img src="assets/free-cover.jpg">
  </a>

  <!-- VIP -->
  <a class="card" href="https://nanonicoins-vip.vercel.app/">
    <img src="assets/vip-cover.jpg">
  </a>

  <!-- SOCIAL ICONS -->
  <div class="social-row">
    <a href="https://www.instagram.com/nanoni.corp" target="_blank">
      <img src="assets/instagram.png">
    </a>

    <a href="https://www.tiktok.com/@nanonicorp" target="_blank">
      <img src="assets/tiktok.png">
    </a>
  </div>

</div>

</body>
</html>
