<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nanonicoins Hub</title>

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      font-family: Inter, sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 50% -10%, rgba(255,255,255,.05), transparent 28%),
        radial-gradient(circle at 0% 0%, rgba(255,255,255,.02), transparent 24%),
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.02), transparent 24%),
        linear-gradient(180deg, #050505 0%, #090909 50%, #050505 100%);
      overflow-x:hidden;
    }

    /* 🌧️ CHUVA VERMELHA SUTIL */
    .rain{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:.18;

      background-image:
        linear-gradient(to bottom, rgba(255,40,40,0), rgba(255,40,40,.15), rgba(255,40,40,0)),
        linear-gradient(to bottom, rgba(255,60,60,0), rgba(255,60,60,.10), rgba(255,60,60,0)),
        linear-gradient(to bottom, rgba(255,30,30,0), rgba(255,30,30,.12), rgba(255,30,30,0));

      background-size: 1px 160px, 1px 200px, 1px 240px;
      background-repeat: repeat-y;

      animation: rainMove 6s linear infinite;
    }

    @keyframes rainMove{
      0%{
        background-position: 10% -200px, 40% -300px, 75% -250px;
      }
      100%{
        background-position: 10% 800px, 40% 900px, 75% 850px;
      }
    }

    .wrap{
      width:min(760px, calc(100% - 28px));
      margin:0 auto;
      padding:22px 0 42px;
      position:relative;
      z-index:2;
    }

    .top{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .top-logo{
      width:64px;
      height:64px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.05);
      display:grid;
      place-items:center;
    }

    .top-logo img{
      width:44px;
    }

    .eyebrow{
      font-size:11px;
      letter-spacing:.34em;
      text-transform:uppercase;
      color:rgba(255,255,255,.4);
      font-weight:800;
    }

    .title{
      font-size:34px;
      font-weight:900;
    }

    .subtitle{
      color:rgba(255,255,255,.6);
      font-size:14px;
    }

    .hero-shell{
      padding:16px;
      border-radius:34px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);
    }

    .stack{
      display:grid;
      gap:14px;
    }

    .card{
      position:relative;
      min-height:210px;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }

    .card img,
    .card video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .card::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,.4), transparent);
    }

    .card-ui{
      position:absolute;
      bottom:18px;
      right:18px;
      z-index:2;
    }

    .arrow{
      width:48px;
      height:48px;
      border-radius:999px;
      background:rgba(255,255,255,.1);
      display:grid;
      place-items:center;
      font-size:20px;
    }

    .social{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:14px;
    }

    @media (max-width:640px){
      .social{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <!-- chuva -->
  <div class="rain"></div>

  <main class="wrap">

    <section class="top">
      <div class="top-logo">
        <img src="assets/logo-main.png">
      </div>
      <div>
        <div class="eyebrow">Nanonicoins</div>
        <div class="title">Hub Oficial</div>
        <div class="subtitle">Minimalista, premium e pronto para seus cartões.</div>
      </div>
    </section>

    <section class="hero-shell">
      <div class="stack">

        <!-- 🔥 AGORA COMEÇA DIRETO NOS CARDS QUE VOCÊ VAI USAR -->

        <a class="card" href="https://lading-free.vercel.app/">
          <img src="assets/free-cover.jpg">
          <div class="card-ui">
            <div class="arrow">→</div>
          </div>
        </a>

        <a class="card" href="https://nanonicoins-vip.vercel.app/">
          <img src="assets/vip-cover.jpg">
          <div class="card-ui">
            <div class="arrow">→</div>
          </div>
        </a>

        <div class="social">

          <a class="card" href="https://www.instagram.com/nanoni.corp">
            <img src="assets/instagram-cover.jpg">
            <div class="card-ui">
              <div class="arrow">→</div>
            </div>
          </a>

          <a class="card" href="https://www.tiktok.com/@nanonicorp">
            <img src="assets/tiktok-cover.jpg">
            <div class="card-ui">
              <div class="arrow">→</div>
            </div>
          </a>

        </div>

      </div>
    </section>

  </main>

</body>
</html>
