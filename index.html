<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nanonicorp Hub</title>

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      font-family: Inter, sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 50% -10%, rgba(255,255,255,.05), transparent 28%),
        radial-gradient(circle at 0% 0%, rgba(255,255,255,.02), transparent 24%),
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.02), transparent 24%),
        linear-gradient(180deg, #050505 0%, #090909 50%, #050505 100%);
      overflow-x:hidden;
    }

    .rain{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:.16;
      background-image:
        linear-gradient(to bottom, rgba(255,40,40,0), rgba(255,40,40,.14), rgba(255,40,40,0)),
        linear-gradient(to bottom, rgba(255,60,60,0), rgba(255,60,60,.10), rgba(255,60,60,0)),
        linear-gradient(to bottom, rgba(255,30,30,0), rgba(255,30,30,.12), rgba(255,30,30,0)),
        linear-gradient(to bottom, rgba(255,90,90,0), rgba(255,90,90,.07), rgba(255,90,90,0));
      background-size:
        2px 180px,
        2px 220px,
        2px 240px,
        2px 280px;
      background-position:
        8% -240px,
        31% -320px,
        57% -260px,
        83% -340px;
      background-repeat: repeat-y;
      animation: rainMove 5s linear infinite;
    }

    @keyframes rainMove{
      0%{
        background-position: 8% -240px, 31% -320px, 57% -260px, 83% -340px;
      }
      100%{
        background-position: 8% 900px, 31% 980px, 57% 940px, 83% 1020px;
      }
    }

    .wrap{
      width:min(860px, calc(100% - 28px));
      margin:0 auto;
      padding:28px 0 42px;
      position:relative;
      z-index:2;
    }

    .top{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .top-logo{
      width:64px;
      height:64px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.05);
      display:grid;
      place-items:center;
      flex-shrink:0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 10px 30px rgba(0,0,0,.24);
    }

    .top-logo img{
      width:44px;
      display:block;
    }

    .eyebrow{
      font-size:11px;
      letter-spacing:.34em;
      text-transform:uppercase;
      color:rgba(255,255,255,.38);
      font-weight:800;
    }

    .title{
      font-size:34px;
      font-weight:900;
      line-height:1.02;
    }

    .subtitle{
      color:rgba(255,255,255,.55);
      font-size:14px;
      margin-top:4px;
    }

    .hero-shell{
      padding:16px;
      border-radius:34px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);
      box-shadow:
        0 10px 40px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
    }

    .stack{
      display:grid;
      gap:16px;
    }

    .card{
      position:relative;
      min-height:220px;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#080808;
      display:block;
      text-decoration:none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 16px 40px rgba(0,0,0,.28);
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    }

    .card:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 22px 52px rgba(0,0,0,.34);
    }

    .card img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform: scale(1.08);
      transform-origin:center;
    }

    .free-card img{
      transform: scale(1.12);
    }

    .vip-card img{
      transform: scale(1.1);
    }

    .card::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to top, rgba(0,0,0,.16), rgba(0,0,0,.02) 42%, rgba(0,0,0,.06)),
        linear-gradient(to right, rgba(0,0,0,.10), transparent 34%, transparent 66%, rgba(0,0,0,.10));
      pointer-events:none;
    }

    .section-tag{
      position:absolute;
      top:18px;
      left:20px;
      z-index:3;
      font-size:14px;
      font-weight:900;
      letter-spacing:.28em;
      text-transform:uppercase;
      text-shadow: 0 0 10px rgba(255,255,255,.06);
    }

    .section-tag.free{
      color:#7dff9d;
      text-shadow:
        0 0 14px rgba(34,197,94,.2),
        0 0 26px rgba(34,197,94,.08);
    }

    .section-tag.vip{
      color:#ff7a7a;
      text-shadow:
        0 0 14px rgba(239,68,68,.22),
        0 0 26px rgba(239,68,68,.08);
    }

    .section-tag::after{
      content:"";
      display:block;
      width:36px;
      height:2px;
      margin-top:7px;
      border-radius:999px;
      opacity:.9;
    }

    .section-tag.free::after{
      background:linear-gradient(90deg, #22c55e, transparent);
    }

    .section-tag.vip::after{
      background:linear-gradient(90deg, #ef4444, transparent);
    }

    .social-row{
      display:flex;
      justify-content:center;
      gap:16px;
      margin-top:4px;
    }

    .social-row a{
      width:46px;
      height:46px;
      border-radius:15px;
      background:rgba(0,0,0,.62);
      backdrop-filter: blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 12px 30px rgba(0,0,0,.22);
      transition:.2s ease;
    }

    .social-row a:hover{
      transform: translateY(-1px) scale(1.08);
      border-color: rgba(255,255,255,.18);
      background:rgba(8,8,8,.82);
    }

    .social-row a.instagram:hover{
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06),
        0 0 16px rgba(255,84,146,.18),
        0 12px 30px rgba(0,0,0,.22);
    }

    .social-row a.tiktok:hover{
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06),
        0 0 16px rgba(34,211,238,.18),
        0 12px 30px rgba(0,0,0,.22);
    }

    .social-row img{
      width:22px;
      height:22px;
      object-fit:contain;
      display:block;
    }

    @media (max-width:640px){
      .title{
        font-size:30px;
      }

      .subtitle{
        font-size:13px;
      }

      .card{
        min-height:190px;
        border-radius:26px;
      }

      .section-tag{
        font-size:13px;
      }
    }

    @media (max-width:520px){
      .wrap{
        width:min(100%, calc(100% - 18px));
      }

      .top{
        gap:12px;
      }

      .top-logo{
        width:56px;
        height:56px;
        border-radius:18px;
      }

      .top-logo img{
        width:38px;
      }

      .title{
        font-size:28px;
      }

      .hero-shell{
        padding:12px;
        border-radius:28px;
      }

      .card{
        min-height:170px;
        border-radius:24px;
      }

      .section-tag{
        top:14px;
        left:16px;
        font-size:12px;
      }

      .social-row a{
        width:42px;
        height:42px;
        border-radius:13px;
      }

      .social-row img{
        width:20px;
        height:20px;
      }
    }
  </style>
</head>

<body>

  <div class="rain"></div>

  <main class="wrap">

    <section class="top">
      <div class="top-logo">
        <img src="assets/logo-main.png" alt="Logo NanoniCoins">
      </div>
      <div>
        <div class="eyebrow">NANONICOINS</div>
        <div class="title">Hub Oficial</div>
        <div class="subtitle">Free & VIP Access</div>
      </div>
    </section>

    <section class="hero-shell">
      <div class="stack">

        <a class="card free-card" href="https://lading-free.vercel.app/" target="_blank" rel="noopener noreferrer">
          <span class="section-tag free">FREE</span>
          <img src="assets/free-cover.jpg" alt="Free">
        </a>

        <a class="card vip-card" href="https://nanonicoins-vip.vercel.app/" target="_blank" rel="noopener noreferrer">
          <span class="section-tag vip">VIP</span>
          <img src="assets/vip-cover.jpg" alt="VIP">
        </a>

        <div class="social-row">
          <a class="instagram" href="https://www.instagram.com/nanoni.corp" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <img src="assets/instagram.png" alt="Instagram">
          </a>

          <a class="tiktok" href="https://www.tiktok.com/@nanonicorp" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
            <img src="assets/tiktok.png" alt="TikTok">
          </a>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
