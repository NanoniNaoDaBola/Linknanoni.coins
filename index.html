<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nanonicoins Hub</title>
  <meta name="description" content="Hub oficial da Nanonicoins." />
  <style>
    :root{
      --bg:#060606;
      --bg-2:#0b0b0b;
      --panel:rgba(255,255,255,.045);
      --panel-2:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.09);
      --text:#ffffff;
      --muted:rgba(255,255,255,.60);
      --muted-2:rgba(255,255,255,.36);
      --shadow:0 24px 80px rgba(0,0,0,.42);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(255,255,255,.05), transparent 26%),
        radial-gradient(circle at 0% 0%, rgba(255,255,255,.02), transparent 22%),
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.018), transparent 22%),
        linear-gradient(180deg, #050505 0%, #090909 50%, #050505 100%);
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .wrap{
      width:min(760px, calc(100% - 28px));
      margin:0 auto;
      padding:22px 0 42px;
      position:relative;
      z-index:2;
    }

    .glow{
      position:fixed;
      border-radius:999px;
      filter:blur(90px);
      pointer-events:none;
      z-index:0;
      opacity:.55;
    }

    .glow.g1{
      width:260px;
      height:260px;
      left:-80px;
      top:90px;
      background:rgba(255,255,255,.03);
    }

    .glow.g2{
      width:320px;
      height:320px;
      right:-100px;
      top:140px;
      background:rgba(255,255,255,.025);
    }

    .top{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .top-logo{
      width:64px;
      height:64px;
      border-radius:20px;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      display:grid;
      place-items:center;
      overflow:hidden;
      box-shadow:0 14px 36px rgba(0,0,0,.28);
      flex:0 0 auto;
    }

    .top-logo img{
      width:44px;
      height:44px;
      object-fit:contain;
      transform:scale(1.18);
      display:block;
    }

    .eyebrow{
      margin:0 0 4px;
      font-size:11px;
      letter-spacing:.34em;
      text-transform:uppercase;
      color:var(--muted-2);
      font-weight:800;
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:.95;
      letter-spacing:-.06em;
      font-weight:900;
    }

    .subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .hero-shell{
      position:relative;
      padding:16px;
      border-radius:34px;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.03));
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      overflow:hidden;
    }

    .hero-shell::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 12%, rgba(255,255,255,.03), transparent 18%),
        radial-gradient(circle at 80% 14%, rgba(255,255,255,.025), transparent 18%);
      pointer-events:none;
    }

    .stack{
      position:relative;
      z-index:2;
      display:grid;
      gap:14px;
    }

    .card{
      position:relative;
      min-height:210px;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.09);
      background:#0a0a0a;
      box-shadow:0 18px 48px rgba(0,0,0,.32);
      isolation:isolate;
    }

    .card.tall{
      min-height:250px;
    }

    .card img,
    .card video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform:scale(1.02);
      filter:saturate(1.04) contrast(1.04);
    }

    .card::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to top, rgba(0,0,0,.42), rgba(0,0,0,.08) 45%, rgba(0,0,0,.02) 100%);
      z-index:1;
      pointer-events:none;
    }

    .card.free::before,
    .card.vip::before,
    .card.page::before,
    .card.social-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(135deg, rgba(255,255,255,.04), transparent 40%, transparent 60%, rgba(255,255,255,.02));
      z-index:1;
      pointer-events:none;
    }

    .card-ui{
      position:absolute;
      inset:0;
      z-index:2;
      padding:18px;
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
    }

    .arrow{
      width:50px;
      height:50px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.09);
      backdrop-filter:blur(10px);
      color:#fff;
      font-size:20px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 8px 20px rgba(0,0,0,.20);
    }

    .social{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:14px;
    }

    @media (max-width: 640px){
      .wrap{
        width:min(100%, calc(100% - 16px));
        padding-top:14px;
      }

      .title{
        font-size:28px;
      }

      .hero-shell{
        padding:12px;
        border-radius:28px;
      }

      .card{
        min-height:170px;
        border-radius:24px;
      }

      .card.tall{
        min-height:200px;
      }

      .arrow{
        width:46px;
        height:46px;
      }

      .social{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <main class="wrap">
    <section class="top">
      <div class="top-logo">
        <img src="assets/logo-main.png" alt="Nanonicoins logo" />
      </div>
      <div>
        <p class="eyebrow">Nanonicoins</p>
        <h1 class="title">Hub Oficial</h1>
        <p class="subtitle">Minimalista, premium e pronto para receber seus cartões.</p>
      </div>
    </section>

    <section class="hero-shell">
      <div class="stack">

        <a class="card tall free" href="https://t.me/+pR5RzyPgUKY2NDZh" target="_blank" rel="noopener noreferrer">
          <video autoplay muted loop playsinline poster="assets/free-poster.jpg">
            <source src="assets/free-video.mp4" type="video/mp4" />
          </video>
          <div class="card-ui">
            <div class="arrow">→</div>
          </div>
        </a>

        <a class="card tall vip" href="https://payment.ticto.app/O64599EB6" target="_blank" rel="noopener noreferrer">
          <video autoplay muted loop playsinline poster="assets/vip-poster.jpg">
            <source src="assets/vip-video.mp4" type="video/mp4" />
          </video>
          <div class="card-ui">
            <div class="arrow">→</div>
          </div>
        </a>

        <a class="card page" href="https://lading-free.vercel.app/" target="_blank" rel="noopener noreferrer">
          <img src="assets/free-cover.jpg" alt="Landing FREE" />
          <div class="card-ui">
            <div class="arrow">→</div>
          </div>
        </a>

        <a class="card page" href="https://nanonicoins-vip.vercel.app/" target="_blank" rel="noopener noreferrer">
          <img src="assets/vip-cover.jpg" alt="Landing VIP" />
          <div class="card-ui">
            <div class="arrow">→</div>
          </div>
        </a>

        <div class="social">
          <a class="card social-card" href="https://www.instagram.com/nanoni.corp?igsh=MWc4Yjd2dHJmNjNraQ%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer">
            <img src="assets/instagram-cover.jpg" alt="Instagram" />
            <div class="card-ui">
              <div class="arrow">→</div>
            </div>
          </a>

          <a class="card social-card" href="https://www.tiktok.com/@nanonicorp?_r=1&_t=ZS-95BGMbmMe5F" target="_blank" rel="noopener noreferrer">
            <img src="assets/tiktok-cover.jpg" alt="TikTok" />
            <div class="card-ui">
              <div class="arrow">→</div>
            </div>
          </a>
        </div>

      </div>
    </section>
  </main>
</body>
</html>
